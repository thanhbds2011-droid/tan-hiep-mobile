<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ứng dụng Tân Hiệp</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#b91c1c">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      overflow: hidden;
    }

    .app-header {
      height: 56px;
      background: #b91c1c;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 17px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
      position: relative;
      z-index: 20;
    }

    .tabs {
      height: 58px;
      display: flex;
      gap: 8px;
      padding: 8px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      position: relative;
      z-index: 20;
    }

    .tab-btn {
      flex: 1;
      border: 0;
      border-radius: 12px;
      background: #f3f4f6;
      color: #374151;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #b91c1c;
      color: #fff;
    }

    .frame-wrap {
      height: calc(100vh - 114px);
      background: #fff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    .lock-layer {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.58);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 100;
    }

    .lock-box {
      width: 100%;
      max-width: 360px;
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.28);
    }

    .lock-title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
      color: #111827;
      text-align: center;
    }

    .lock-note {
      margin: 0 0 16px;
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      line-height: 1.45;
    }

    .password-input {
      width: 100%;
      height: 46px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 0 12px;
      font-size: 16px;
      outline: none;
    }

    .password-input:focus {
      border-color: #b91c1c;
      box-shadow: 0 0 0 3px rgba(185, 28, 28, 0.12);
    }

    .lock-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .lock-actions button {
      flex: 1;
      height: 42px;
      border: 0;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-cancel {
      background: #e5e7eb;
      color: #374151;
    }

    .btn-open {
      background: #b91c1c;
      color: #fff;
    }

    .error-text {
      display: none;
      margin-top: 10px;
      font-size: 13px;
      color: #b91c1c;
      text-align: center;
      font-weight: 600;
    }

    .footer-hint {
      position: fixed;
      bottom: 8px;
      left: 10px;
      right: 10px;
      z-index: 10;
      display: none;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .app-header {
        height: 54px;
        font-size: 16px;
      }

      .tabs {
        height: 56px;
        padding: 7px;
      }

      .tab-btn {
        font-size: 14px;
      }

      .frame-wrap {
        height: calc(100vh - 110px);
      }
    }
  </style>
</head>

<body>
  <div class="app-header">
    ỨNG DỤNG TÂN HIỆP
  </div>

  <div class="tabs">
    <button id="btnVanBan" class="tab-btn active" onclick="moVanBan()">
      📄 Văn bản
    </button>

    <button id="btnCongLenh" class="tab-btn" onclick="yeuCauMatKhauCongLenh()">
      🚗 Công lệnh
    </button>
  </div>

  <div class="frame-wrap">
    <iframe id="appFrame" src=""></iframe>
  </div>

  <div id="lockLayer" class="lock-layer">
    <div class="lock-box">
      <h2 class="lock-title">Khóa Công lệnh</h2>
      <p class="lock-note">
        Vui lòng nhập mật khẩu để vào phần Công lệnh.
      </p>

      <input
        id="passwordInput"
        class="password-input"
        type="password"
        placeholder="Nhập mật khẩu"
        autocomplete="off"
      />

      <div id="errorText" class="error-text">
        Mật khẩu không đúng. Vui lòng kiểm tra lại.
      </div>

      <div class="lock-actions">
        <button class="btn-cancel" onclick="dongKhoaCongLenh()">Hủy</button>
        <button class="btn-open" onclick="kiemTraMatKhauCongLenh()">Mở</button>
      </div>
    </div>
  </div>

  <script>
    /*
      ============================
      PHẦN ANH CẦN SỬA
      ============================

      1. Đổi TEN_TAI_KHOAN_GITHUB thành tên GitHub thật.
      2. Đổi mật khẩu 123456 thành mật khẩu riêng.
      3. Không sửa các phần bên dưới nếu chưa cần.
    */

    const LINK_VAN_BAN = "https://thanhbds2011-droid.github.io/dashboard-van-ban-tanhiep/";
    const LINK_CONG_LENH = "https://thanhbds2011-droid.github.io/CONGLENH_TANHIEP_2026/";

    const MAT_KHAU_CONG_LENH = "123456";

    const frame = document.getElementById("appFrame");
    const btnVanBan = document.getElementById("btnVanBan");
    const btnCongLenh = document.getElementById("btnCongLenh");
    const lockLayer = document.getElementById("lockLayer");
    const passwordInput = document.getElementById("passwordInput");
    const errorText = document.getElementById("errorText");

    function moVanBan() {
      frame.src = LINK_VAN_BAN;
      btnVanBan.classList.add("active");
      btnCongLenh.classList.remove("active");
      sessionStorage.setItem("tabDangMo", "vanban");
    }

    function yeuCauMatKhauCongLenh() {
      const daMoKhoaTrongPhien = sessionStorage.getItem("moKhoaCongLenh") === "true";

      if (daMoKhoaTrongPhien) {
        moCongLenh();
        return;
      }

      passwordInput.value = "";
      errorText.style.display = "none";
      lockLayer.style.display = "flex";

      setTimeout(function() {
        passwordInput.focus();
      }, 100);
    }

    function dongKhoaCongLenh() {
      lockLayer.style.display = "none";
      passwordInput.value = "";
      errorText.style.display = "none";
    }

    function kiemTraMatKhauCongLenh() {
      const matKhauNhap = passwordInput.value.trim();

      if (matKhauNhap !== MAT_KHAU_CONG_LENH) {
        errorText.style.display = "block";
        passwordInput.focus();
        return;
      }

      sessionStorage.setItem("moKhoaCongLenh", "true");
      dongKhoaCongLenh();
      moCongLenh();
    }

    function moCongLenh() {
      frame.src = LINK_CONG_LENH;
      btnCongLenh.classList.add("active");
      btnVanBan.classList.remove("active");
      sessionStorage.setItem("tabDangMo", "conglenh");
    }

    passwordInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        kiemTraMatKhauCongLenh();
      }

      if (event.key === "Escape") {
        dongKhoaCongLenh();
      }
    });

    // Khi mở app, mặc định vào Dashboard văn bản.
    moVanBan();

    // Đăng ký PWA.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(function(error) {
        console.log("Không đăng ký được service worker:", error);
      });
    }
  </script>
</body>
</html>
